<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangkit — Diskusi</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="mark">
      <div class="mark-glyph"></div>
      <div class="mark-word">Bangkit</div>
    </div>
    <ul class="nav-list">
      <li><a href="dashboard.html"><span class="nav-dot"></span> Dasbor</a></li>
      <li><a href="scan.html"><span class="nav-dot"></span> Scan</a></li>
      <li><a href="progress.html"><span class="nav-dot"></span> Progres</a></li>
      <li><a href="chat.html" class="active"><span class="nav-dot"></span> Diskusi</a></li>
      <li><a href="settings.html"><span class="nav-dot"></span> Setelan</a></li>
    </ul>
    <div class="sidebar-foot">
      <div class="user-chip">
        <span id="sidebar-name">—</span>
        <span class="lv-badge" id="sidebar-level" style="margin-left:auto;">LV 1</span>
      </div>
    </div>
  </aside>

  <main class="main" style="display:flex; flex-direction:column;">
    <div class="page-head">
      <div>
        <div class="eyebrow">Interaksi</div>
        <h1>Asisten Penasihat</h1>
      </div>
    </div>

    <!-- Chat container -->
    <div class="chat-shell">
      <div class="chat-messages" id="chat-messages">
        <!-- Chat bubbles will go here -->
      </div>
      <form class="chat-input-area" id="chat-form">
        <input type="text" id="chat-input" placeholder="Tanyakan seputar efisiensi waktu, jadwal produktif, atau rekomendasi..." required autocomplete="off">
        <button type="submit" class="btn btn-sm" id="chat-send-btn">Kirim</button>
      </form>
    </div>
  </main>
</div>

<button class="hint-btn" id="hint-btn" title="Bantuan / Pengenalan ulang">?</button>

<!-- Firebase SDK Compat -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/levels.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script>
  initChatPage();
</script>
</body>
</html>
